{{/*
  One env Secret per component. Each pod's envFrom references only the
  Secret(s) it needs. Values in `global.env` are merged into every Secret as
  defaults; per-component `.config` keys override.

  Secret naming: <release>-env-<component>
*/}}
{{- $secrets := list
  (dict "name" "web" "config" .Values.web.config)
-}}
{{- range $s := $secrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mypick-nijigasaki.fullname" $ }}-env-{{ $s.name }}
  labels:
    {{- include "mypick-nijigasaki.labels" $ | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := $.Values.global.env }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- if $s.config }}
  {{- range $k, $v := $s.config }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}
