# JSON access log. JA3 / JA4 / ASN are TLS-handshake + network attributes that
# this proxy can't compute itself (it serves plain HTTP; TLS is terminated at
# the edge / Cloudflare). They're read from request headers the edge injects.
# With Cloudflare, add HTTP-request Transform Rules:
#   X-JA3  =  cf.bot_management.ja3_hash     (Bot Management add-on)
#   X-JA4  =  cf.bot_management.ja4          (Bot Management add-on)
#   X-ASN  =  ip.src.asnum                   (string)
# If a header isn't sent, the field logs "" — harmless.
log_format json_combined escape=json '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"client_ip":"$http_cf_connecting_ip",'
    '"method":"$request_method",'
    '"uri":"$uri",'
    '"query":"$query_string",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"upstream_addr":"$upstream_addr",'
    '"ja3":"$http_x_ja3",'
    '"ja4":"$http_x_ja4",'
    '"asn":"$http_x_asn",'
    '"country":"$http_cf_ipcountry",'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent"'
'}';

upstream web_upstream {
    # nginx runs as a sidecar in the web Pod — talk to the Next.js
    # container over the shared loopback. No service hop.
    server 127.0.0.1:{{ .Values.web.port }};
}

server {
    listen {{ .Values.web.sidecars.nginx.port }};
    server_name _;

    access_log /var/log/nginx/access.log json_combined;

    # generous body size for any future uploads; covers/picks are tiny
    client_max_body_size 5m;

    # Next.js streaming SSR + Server Actions need HTTP/1.1 and unbuffered
    # responses, otherwise long requests stall and stream chunks arrive in
    # one blob.
    proxy_http_version 1.1;
    proxy_buffering    off;

    # Cache Next.js static assets aggressively — they're content-hashed.
    location /_next/static/ {
        proxy_pass         http://web_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        proxy_pass         http://web_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
