server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log json_combined;

    # generous body size for any future uploads; covers/picks are tiny
    client_max_body_size 5m;

    # Re-resolve the `web` hostname per request via Docker's embedded DNS, so
    # nginx picks up the new container IP after `docker compose up -d --build web`
    # instead of 502-ing against a stale IP. Requires the `set $var` + variable
    # `proxy_pass` form below — a literal proxy_pass caches the IP forever.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $upstream http://web:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
